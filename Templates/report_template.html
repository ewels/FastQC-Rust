<!DOCTYPE html>
<html>
<head>
    <title>{{TITLE}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style type="text/css">
{{CSS_CONTENT}}
    </style>
{{ECHARTS_SCRIPT}}
</head>
<body>
    <!-- Hidden checkbox for mobile menu toggle -->
    <input type="checkbox" id="menu-toggle" class="menu-toggle-input" />

    <!-- Mobile navigation bar (hidden on desktop) -->
    <div class="mobile-nav">
        <label for="menu-toggle" class="menu-toggle">
            <span class="hamburger"></span>
            <span class="hamburger"></span>
            <span class="hamburger"></span>
        </label>
        <div class="mobile-title">
            {{FASTQC_ICON_SVG_MOBILE}}
            <span class="mobile-title-app">FastQC:</span>
            <span class="mobile-title-filename">{{FILENAME}}</span>
        </div>
    </div>

    <div class="container">
        <!-- Sidebar with header and navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="header-title"><a href="#" alt="Back to top">
                    {{FASTQC_ICON_SVG_SIDEBAR}}FastQC Report
                </a></h1>
                <div class="header-filename">
                    <p><a href="#" alt="Back to top">{{DATE}}</a></p>
                    <p><strong><a href="#" alt="Back to top">{{FILENAME}}</a></strong></p>
                </div>
            </div>

            <nav class="navigation">
                <h2>Summary</h2>
                <ul>
{{SUMMARY_ITEMS}}
                </ul>
                <div class="theme-toggle-container">
                    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle dark/light mode">
                        <span class="theme-icon light-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="m3.55 19.09l1.41 1.41l1.8-1.79l-1.42-1.42M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6s6-2.69 6-6c0-3.32-2.69-6-6-6m8 7h3v-2h-3m-2.76 7.71l1.8 1.79l1.41-1.41l-1.79-1.8M20.45 5l-1.41-1.4l-1.8 1.79l1.42 1.42M13 1h-2v3h2M6.76 5.39L4.96 3.6L3.55 5l1.79 1.81zM1 13h3v-2H1m12 9h-2v3h2"/>
                            </svg>
                        </span>
                        <span class="theme-icon dark-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="m17.75 4.09l-2.53 1.94l.91 3.06l-2.63-1.81l-2.63 1.81l.91-3.06l-2.53-1.94L12.44 4l1.06-3l1.06 3zm3.5 6.91l-1.64 1.25l.59 1.98l-1.7-1.17l-1.7 1.17l.59-1.98L15.75 11l2.06-.05L18.5 9l.69 1.95zm-2.28 4.95c.83-.08 1.72 1.1 1.19 1.85c-.32.45-.66.87-1.08 1.27C15.17 23 8.84 23 4.94 19.07c-3.91-3.9-3.91-10.24 0-14.14c.4-.4.82-.76 1.27-1.08c.75-.53 1.93.36 1.85 1.19c-.27 2.86.69 5.83 2.89 8.02a9.96 9.96 0 0 0 8.02 2.89m-1.64 2.02a12.08 12.08 0 0 1-7.8-3.47c-2.17-2.19-3.33-5-3.49-7.82c-2.81 3.14-2.7 7.96.31 10.98c3.02 3.01 7.84 3.12 10.98.31"/>
                            </svg>
                        </span>
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main content area -->
        <main class="main">
            <div class="modules-container">
{{MODULE_CONTENT}}
            </div>

            <footer class="footer">
                Produced by <a href="http://www.bioinformatics.babraham.ac.uk/projects/fastqc/" target="_blank">FastQC</a>
                (version {{VERSION}}).
            </footer>
        </main>
    </div>

    <script>
        //<![CDATA[
        // Theme and chart management functionality
        (function() {
            const themeToggle = document.getElementById('theme-toggle');
            const html = document.documentElement;

            // Store all chart instances for theme updates
            window.fastqc_charts = window.fastqc_charts || {};
            window.fastqc_chart_options = window.fastqc_chart_options || {};

            // Get theme from localStorage or default to light
            const savedTheme = localStorage.getItem('fastqc-theme') || 'light';
            html.setAttribute('data-theme', savedTheme);

            // Theme colors configuration
            window.getThemeColors = function(theme) {
                const themes = {
                    light: {
                        background: '#ffffff',
                        text: '#000000',
                        grid: '#e0e0e0',
                        axis: '#666666',
                        primary: '#0000C8',
                        secondary: '#800000',
                        success: '#2f6638',
                        warning: '#8d6c08',
                        error: '#862a13',
                        boxplot: 'rgba(240,240,0,0.8)',
                        boxplotBorder: '#000',
                        qualityGood: 'rgba(195,230,195,0.3)',
                        qualityWarning: 'rgba(230,220,195,0.3)',
                        qualityBad: 'rgba(230,195,195,0.3)'
                    },
                    dark: {
                        background: '#1a1a1a',
                        text: '#e0e0e0',
                        grid: '#444444',
                        axis: '#a0a0a0',
                        primary: '#6bb6ff',
                        secondary: '#ff6b6b',
                        success: '#4ade80',
                        warning: '#fbbf24',
                        error: '#f87171',
                        boxplot: 'rgba(251,191,36,0.8)',
                        boxplotBorder: '#000000',
                        qualityGood: 'rgba(74,222,128,0.3)',
                        qualityWarning: 'rgba(251,191,36,0.3)',
                        qualityBad: 'rgba(248,113,113,0.3)'
                    }
                };
                return themes[theme] || themes.light;
            };

            // Function to update all charts with new theme
            window.updateAllChartThemes = function(theme) {
                const colors = window.getThemeColors(theme);

                Object.keys(window.fastqc_charts).forEach(chartId => {
                    const chart = window.fastqc_charts[chartId];
                    const baseOption = window.fastqc_chart_options[chartId];

                    if (chart && baseOption && typeof window['applyThemeToChart_' + chartId] === 'function') {
                        // Call the chart-specific theme function
                        const themedOption = window['applyThemeToChart_' + chartId](baseOption, colors);
                        chart.setOption(themedOption, true);
                    }
                });
            };

            // Toggle theme function
            function toggleTheme() {
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('fastqc-theme', newTheme);

                // Update chart themes
                window.updateAllChartThemes(newTheme);
            }

            // Add event listener
            themeToggle.addEventListener('click', toggleTheme);

            // Apply initial theme to any existing charts
            setTimeout(() => {
                window.updateAllChartThemes(savedTheme);
            }, 100);
        })();
        //]]>
    </script>
</body>
</html>
