  - generic [ref=e2570]:
    - heading "Known Differences" [level=2] [ref=e2571]
    - paragraph [ref=e2572]: The following differences between Java and Rust output are expected and normalized during comparison. SVG files that show as "Expected diff" or "NORMALIZED" have had these normalizations applied before diffing.
    - heading "Font family" [level=3] [ref=e2573]
    - paragraph [ref=e2574]:
      - text: Java uses
      - code [ref=e2575]: Arial
      - text: (system font). Rust uses
      - code [ref=e2576]: Liberation Sans
      - text: (bundled, metric-compatible with Arial). The font-family attribute is normalized to
      - code [ref=e2577]: "[FONT]"
      - text: before comparison.
    - heading "shape-rendering=\"crispEdges\"" [level=3] [ref=e2578]
    - paragraph [ref=e2579]:
      - text: Rust adds
      - code [ref=e2580]: shape-rendering="crispEdges"
      - text: to rectangles and axis lines for pixel-sharp rendering. Java relies on Java2D's default rendering and doesn't include this attribute. It is stripped before comparison.
    - heading "font-weight=\"bold\" on titles" [level=3] [ref=e2581]
    - paragraph [ref=e2582]:
      - text: Rust renders chart titles with
      - code [ref=e2583]: font-weight="bold"
      - text: for visual correctness. Java's SVGGenerator doesn't capture the bold attribute in the SVG output (though the rendered PNG uses bold). The bold attribute is stripped before comparison.
    - heading "stroke-width on data lines" [level=3] [ref=e2584]
    - paragraph [ref=e2585]:
      - text: Java's
      - code [ref=e2586]: SVGGenerator
      - text: captures data lines with
      - code [ref=e2587]: stroke-width="1"
      - text: ", but the actual PNG rendering uses"
      - code [ref=e2588]: BasicStroke(2)
      - text: for 2px-wide lines. Rust uses
      - code [ref=e2589]: stroke-width="2"
      - text: in the SVG so the PNG output matches Java visually. The stroke-width attribute is normalized before comparison.
    - heading "SVG x-coordinate snapping" [level=3] [ref=e2590]
    - paragraph [ref=e2591]:
      - text: Text positioning in SVG depends on precise font metrics. Java uses
      - code [ref=e2592]: FontMetrics.stringWidth()
      - text: with the actual Arial font, while Rust approximates character widths. This produces 1-7px differences in text element x-coordinates (titles, axis labels, legend positions). Coordinates are snapped to the nearest 5px before comparison to absorb these differences.
    - heading "PNG rendering engine differences" [level=3] [ref=e2593]
    - paragraph [ref=e2594]: Java renders PNGs via Java2D, Rust via resvg + tiny-skia. Even with identical SVG coordinates, subpixel antialiasing differs between the two engines. This produces ~1-2% pixel differences on most charts, and up to ~10% on charts with many diagonal data lines. The pixel tolerance threshold is 12.0%.