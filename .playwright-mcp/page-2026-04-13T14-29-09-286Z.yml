  - generic [ref=e156]:
    - heading "Known Differences" [level=2] [ref=e157]
    - paragraph [ref=e158]: The following differences between Java and Rust output are expected and normalized during comparison. SVG files that show as "Expected diff" or "NORMALIZED" have had these normalizations applied before diffing.
    - heading "Font family" [level=3] [ref=e159]
    - paragraph [ref=e160]:
      - text: Java uses
      - code [ref=e161]: Arial
      - text: (system font). Rust uses
      - code [ref=e162]: Liberation Sans
      - text: (bundled, metric-compatible with Arial). The font-family attribute is normalized to
      - code [ref=e163]: "[FONT]"
      - text: before comparison.
    - heading "shape-rendering=\"crispEdges\"" [level=3] [ref=e164]
    - paragraph [ref=e165]:
      - text: Rust adds
      - code [ref=e166]: shape-rendering="crispEdges"
      - text: to rectangles and axis lines for pixel-sharp rendering. Java relies on Java2D's default rendering and doesn't include this attribute. It is stripped before comparison.
    - heading "font-weight=\"bold\" on titles" [level=3] [ref=e167]
    - paragraph [ref=e168]:
      - text: Rust renders chart titles with
      - code [ref=e169]: font-weight="bold"
      - text: for visual correctness. Java's SVGGenerator doesn't capture the bold attribute in the SVG output (though the rendered PNG uses bold). The bold attribute is stripped before comparison.
    - heading "stroke-width on data lines" [level=3] [ref=e170]
    - paragraph [ref=e171]:
      - text: Java's
      - code [ref=e172]: SVGGenerator
      - text: captures data lines with
      - code [ref=e173]: stroke-width="1"
      - text: ", but the actual PNG rendering uses"
      - code [ref=e174]: BasicStroke(2)
      - text: for 2px-wide lines. Rust uses
      - code [ref=e175]: stroke-width="2"
      - text: in the SVG so the PNG output matches Java visually. The stroke-width attribute is normalized before comparison.
    - heading "SVG x-coordinate snapping" [level=3] [ref=e176]
    - paragraph [ref=e177]:
      - text: Text positioning in SVG depends on precise font metrics. Java uses
      - code [ref=e178]: FontMetrics.stringWidth()
      - text: with the actual Arial font, while Rust approximates character widths. This produces 1-7px differences in text element x-coordinates (titles, axis labels, legend positions). Coordinates are snapped to the nearest 5px before comparison to absorb these differences.
    - heading "PNG rendering engine differences" [level=3] [ref=e179]
    - paragraph [ref=e180]: Java renders PNGs via Java2D, Rust via resvg + tiny-skia. Even with identical SVG coordinates, subpixel antialiasing differs between the two engines. This produces ~1-2% pixel differences on most charts, and up to ~10% on charts with many diagonal data lines. The pixel tolerance threshold is 12.0%.